<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArcanjoMed</title>

<style>

/* IDENTIDADE VISUAL HOSPITALAR */
:root{
    --azul-profundo:#0b3c5d;
    --azul-secundario:#1d6fa5;
    --dourado:#c9a227;
    --verde-clinico:#2bb673;
    --fundo:#eef3f8;
    --branco:#ffffff;
    --cinza:#6b7280;
    --alerta:#e53935;
}

body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:linear-gradient(135deg,#e6f0fa,#f5f9ff);
}

.app{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:var(--fundo);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    border: 8px solid var(--azul-profundo);
}

.header{
    background:linear-gradient(135deg,var(--azul-profundo),var(--azul-secundario));
    color:white;
    padding:20px;
    text-align:center;
}

.header h2{
    margin:0;
    font-weight:700;
    letter-spacing:2px;
    color:rgb(252, 252, 252);
    font-size:40px;

    animation: glowPulse 2.5s infinite ease-in-out;
    text-shadow: 0 0 10px rgba(201,162,39,0.6);
    -webkit-text-stroke: 2px rgb(236, 6, 6);
}

@keyframes glowPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

#dataHora{
    font-size:20px;
    opacity:0.9;
    margin-top: 10px;
}

.container{
    padding:15px;
}

.card{
    background:var(--branco);
    border-radius:18px;
    padding:16px;
    margin-bottom:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card h3{
    margin:0 0 10px 0;
    color:var(--azul-profundo);
    font-size:16px;
}

label{
    display:block;
    margin-top:10px;
    font-weight:600;
    color:red;
    font-size:13px;
}

input, select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #d1d5db;
    margin-top:6px;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--verde-clinico),#1e9e63);
    color:white;
}

.registro{
    background:#f9fbfd;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border-left:4px solid var(--azul-secundario);
    font-size:13px;
}

.titulo-vermelho {
    color:red;
}

.separador {
  height: 3px;
  background: var(--cinza);
  margin: 20px 0;
  border-radius: 4px;
}

.idoso input,
.idoso select{
    font-size:22px;
    padding:18px;
}

.idoso button{
    font-size:22px;
    padding:18px;
}

/* ALERTAS DOS SINAIS */
.msg{
    font-size:12px;
    margin-top:4px;
}

</style>
</head>

<body>

<div class="app" id="app">

<div class="header">
<h2>
  <span class="icon">❤️‍🩹</span>
  ArcanjoMed
</h2>
<b><div id="dataHora"></div></b>
</div>

<div class="container">

<button onclick="document.getElementById('app').classList.toggle('idoso')">
🧓 Aumentar Letra
</button>

<div class="card">
<h3 class="titulo-vermelho">DADOS PESSOAIS</h3>

<label>Nome</label>
<input id="nome">

<label>Data de Nascimento</label>
<input type="date" id="nascimento" onchange="calcularIdade()">
<div id="idade"></div>

<label>Sexo</label>
<select id="sexo">
<option>Masculino</option>
<option>Feminino</option>
</select>

<label>Hospital</label>
<input id="hospital">

<div class="separador"></div>

<h3>MEDIÇÕES</h3>

<label>Pressão</label>
<input id="pressao">
<div id="msgPressao" class="msg"></div>

<label>Glicemia</label>
<input id="glicemia" type="number">
<div id="msgGlicemia" class="msg"></div>

<label>Saturação</label>
<input id="saturacao" type="number" min="0" max="100">
<div id="msgSaturacao" class="msg"></div>

<label>Peso</label>
<input id="peso" type="number">
<div id="msgPeso" class="msg"></div>

<label>Medicamento</label>
<input id="medicamento">

<button onclick="salvarAfericao()">Salvar anotações</button>

</div>

<div class="card">
<h3>Histórico</h3>
<div id="historico"></div>
</div>

</div>
</div>

<script>

setInterval(()=>{
document.getElementById("dataHora").innerText =
new Date().toLocaleString();
},1000);

function getDB(){
return JSON.parse(localStorage.getItem("db")) || {};
}

function setDB(db){
localStorage.setItem("db", JSON.stringify(db));
}

function calcularIdade(){
const campo = document.getElementById("nascimento").value;
const idadeEl = document.getElementById("idade");

if(!campo){
idadeEl.innerText = "";
return;
}

const [ano, mes, dia] = campo.split("-");
const nasc = new Date(ano, mes - 1, dia);
const hoje = new Date();

let idadeCalc = hoje.getFullYear() - nasc.getFullYear();
const m = hoje.getMonth() - nasc.getMonth();

if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) {
idadeCalc--;
}

idadeEl.innerText = "Idade: " + idadeCalc + " anos";
}

function validarSinais(){

let sat = Number(saturacao.value);
if(sat){
if(sat < 95){
msgSaturacao.innerText = "⚠️ Saturação baixa!";
}else{
msgSaturacao.innerText = "✔ Normal";
}
}

let glic = Number(glicemia.value);
if(glic){
if(glic > 180){
msgGlicemia.innerText = "⚠️ Glicemia alta!";
}else if(glic < 70){
msgGlicemia.innerText = "⚠️ Glicemia baixa!";
}else{
msgGlicemia.innerText = "✔ Normal";
}
}

let press = pressao.value;
if(press.includes("/")){
let [s,d] = press.split("/").map(Number);

if(s > 140 || d > 90){
msgPressao.innerText = "⚠️ Pressão alta!";
}else{
msgPressao.innerText = "✔ Normal";
}
}

let pesoVal = Number(peso.value);
if(pesoVal){
if(pesoVal < 50){
msgPeso.innerText = "⚠️ Baixo";
}else if(pesoVal > 120){
msgPeso.innerText = "⚠️ Alto";
}else{
msgPeso.innerText = "✔ Normal";
}
}

}

saturacao.oninput = validarSinais;
glicemia.oninput = validarSinais;
pressao.oninput = validarSinais;
peso.oninput = validarSinais;

function salvarAfericao(){
let db = getDB();

if(!db["paciente"]){
db["paciente"] = {historico:[]};
}

db["paciente"].historico.unshift({
pressao:pressao.value,
glicemia:glicemia.value,
saturacao:saturacao.value,
peso:peso.value,
medicamento:medicamento.value,
data:new Date().toLocaleString()
});

setDB(db);
carregarHistorico();
}

function carregarHistorico(){
let db = getDB();
let p = db["paciente"];
historico.innerHTML = "";
if(!p) return;

p.historico.forEach((r,i)=>{
historico.innerHTML += `
<div class="registro">
${r.data}<br>
Pressão: ${r.pressao}<br>
Glicemia: ${r.glicemia}<br>
Saturação: ${r.saturacao}%<br>
Medicamento: ${r.medicamento}

<button onclick="excluir(${i})" style="background:red;margin-top:8px;">
Excluir
</button>

</div>`;
});
}

function excluir(i){
let db = getDB();
db["paciente"].historico.splice(i,1);
setDB(db);
carregarHistorico();
}

carregarHistorico();

</script>

</body>
</html>
